semantic_evaluation_task:
  description: >
    Evaluate the requirement: "{requirement}" against the policy and user documents.
    Return a single JSON object matching the SemanticFinding schema with fields:
    requirement_id, verification, issue_type, policy_citation, user_citation, review_highlight, suggested_edits.
    Do NOT wrap it in a list or a parent container key.
  expected_output: >
    A single JSON object representing a SemanticFinding.